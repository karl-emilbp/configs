# ~/.tmux.conf - practical daily configuration

# ---- Prefix ----
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ---- General ----
set -g history-limit 50000
set -g mouse on
set -s escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ---- Key Bindings ----
bind r source-file ~/.tmux.conf \; display "Reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Copy Mode ----
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"

# Ctrl+Shift+C / Ctrl+Shift+V like a normal terminal
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"
bind-key -n C-S-c if-shell -F "#{pane_in_mode}" \
  "send-keys -X copy-pipe-and-cancel 'xclip -sel clip -i'" \
  "send-keys C-c"
bind-key -n C-S-v run-shell "xclip -o -sel clip | tmux load-buffer -" \; paste-buffer

# ---- Status Bar ----
set -g status-interval 5
set -g status-style bg=black,fg=white
set -g status-left "#[fg=green,bold][#S] "
set -g status-right "#[fg=cyan]%H:%M %d-%b"
set -g status-justify left
setw -g window-status-current-style fg=yellow,bold